<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d0660"/>
      <stop offset="100%" stop-color="#0f0225"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="80"  cy="80"  r="6" fill="#fde68a" opacity="0.9"/>
  <circle cx="430" cy="60"  r="4" fill="#fde68a" opacity="0.8"/>
  <circle cx="460" cy="200" r="5" fill="#f9a8d4" opacity="0.8"/>
  <circle cx="50"  cy="320" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="490" cy="400" r="4" fill="#fde68a" opacity="0.7"/>

  <!-- Horn -->
  <polygon points="256,60 276,170 236,170" fill="#f9a8d4"/>
  <line x1="256" y1="60" x2="256" y2="170" stroke="#e879a0" stroke-width="2" opacity="0.4"/>

  <!-- Mane left side -->
  <ellipse cx="156" cy="230" rx="22" ry="72" fill="#c084fc" opacity="0.85" transform="rotate(-22 156 230)"/>
  <ellipse cx="136" cy="240" rx="14" ry="55" fill="#f9a8d4" opacity="0.8" transform="rotate(-28 136 240)"/>

  <!-- Head (white) -->
  <ellipse cx="256" cy="255" rx="105" ry="98" fill="white"/>

  <!-- Eye -->
  <ellipse cx="290" cy="248" rx="16" ry="18" fill="#1a0533"/>
  <circle cx="296" cy="243" r="5" fill="white"/>

  <!-- Nostril -->
  <ellipse cx="308" cy="290" rx="7" ry="5" fill="#f9a8d4"/>

  <!-- Mane strands (right) peeking -->
  <ellipse cx="368" cy="210" rx="16" ry="50" fill="#a855f7" opacity="0.5" transform="rotate(18 368 210)"/>

  <!-- Cloud base -->
  <ellipse cx="256" cy="400" rx="115" ry="52" fill="white" opacity="0.95"/>
  <ellipse cx="190" cy="385" rx="65" ry="45" fill="white" opacity="0.95"/>
  <ellipse cx="322" cy="385" rx="72" ry="45" fill="white" opacity="0.95"/>

  <!-- Rainbow under cloud -->
  <path d="M 155 420 Q 256 340 357 420" fill="none" stroke="#ef4444" stroke-width="5" opacity="0.7"/>
  <path d="M 163 427 Q 256 352 349 427" fill="none" stroke="#f97316" stroke-width="4" opacity="0.7"/>
  <path d="M 171 433 Q 256 362 341 433" fill="none" stroke="#facc15" stroke-width="4" opacity="0.7"/>
  <path d="M 179 438 Q 256 372 333 438" fill="none" stroke="#4ade80" stroke-width="4" opacity="0.7"/>
  <path d="M 187 442 Q 256 381 325 442" fill="none" stroke="#60a5fa" stroke-width="4" opacity="0.7"/>
  <path d="M 195 445 Q 256 390 317 445" fill="none" stroke="#c084fc" stroke-width="4" opacity="0.7"/>
</svg>
